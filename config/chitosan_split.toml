# Experimental split-width Gaussian profile for unit-assignment diagnostics.
# This file intentionally copies the production chitosan calibration and changes
# only the peak profile. Use it with --selected-summary so N comes from the
# validated label-free batch and the split model is evaluated at that fixed N.

[model]
spacing_min_nm = 0.35
spacing_max_nm = 0.75
max_overlap = 0.60
sigma_parallel_min_nm = 0.191
sigma_parallel_max_nm = 0.509
fit_width_nm = 0.16

support_noise_k = 2.5
support_padding_nm = 0.25
support_min_length_nm = 1.0
support_baseline_quantile = 0.10

global_maxtime = 10.0
global_maxiter = 10000
max_iter = 300
multistart = 1

selection_criterion = "gcv"
cv_method = "gcv"
selection_policy = "gcv_with_robust_aicc_guard"
cv_folds = 5
bic_cv_margin = 100
cv_ratio_threshold = 2.0

kappa_max = 10.0
kappa_weight = 1.0
min_amplitude_fraction = 0.3

chain_tilted_baseline = true
chain_circular_sigmas = false

# Phase A unit-assignment experiment: split σ∥ around the lobe center.
# skew_ratio = σright / σleft, bounded to [1/skew_ratio_max, skew_ratio_max].
peak_profile = "split"
skew_ratio_max = 2.0

[selection]
gcv_ambiguity_rel_threshold = 0.05
robust_guard_nu = 8.0

[preprocessing]
stride = 1
flatten = "plane+rows"
smooth_radius_px = 1
