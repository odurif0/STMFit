# STMFit calibration — experimental adaptive support-rescue selector
#
# Starts from the validated short-chain chitosan calibration. The default support
# detector is used first. A permissive support rescue pass is attempted only when
# the selected N sits at the objective support-feasibility ceiling, which is a
# label-free sign that the detected support may be truncated.
#
# Experimental: not the default production calibration.

[model]
# ── Physical constraints ──
spacing_min_nm = 0.35
spacing_max_nm = 0.75
max_overlap = 0.60
sigma_parallel_min_nm = 0.191
sigma_parallel_max_nm = 0.509
fit_width_nm = 0.16

# ── First-pass support detection ──
support_noise_k = 2.5
support_padding_nm = 0.25
support_min_length_nm = 1.0
support_baseline_quantile = 0.10

# ── Adaptive support rescue pass ──
adaptive_rescue_support_noise_k = 1.5
adaptive_rescue_support_padding_nm = 0.75
adaptive_rescue_min_support_gain_nm = 0.75
adaptive_rescue_feasible_margin = 0
adaptive_rescue_max_circ_ell_delta = 1

# ── Optimization ──
global_maxtime = 10.0
global_maxiter = 10000
max_iter = 300
multistart = 1

# ── Model selection ──
selection_criterion = "gcv"
cv_method = "gcv"
selection_policy = "adaptive_support_rescue"
cv_folds = 5
bic_cv_margin = 100
cv_ratio_threshold = 2.0

# ── Penalties ──
kappa_max = 10.0
kappa_weight = 1.0
min_amplitude_fraction = 0.3

# ── Variants ──
chain_tilted_baseline = true
chain_circular_sigmas = false

[preprocessing]
stride = 1
flatten = "plane+rows"
smooth_radius_px = 1
