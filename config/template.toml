# STMFit calibration template — copy and adapt for a new molecule.
#
# Every value below is the chitosan-on-Cu(100) default. To calibrate a new
# molecule, measure the quantities described in the comments on a few
# representative scans and replace the values. Only [model] is mandatory;
# everything else has sensible defaults.
#
# Workflow:
#   1. Copy this file:  cp config/template.toml config/<molecule>.toml
#   2. Measure FWHM of isolated lobes -> derive sigma_parallel_* (FWHM / 2.355).
#   3. Measure observed repeat pitch -> spacing_min/max (e.g. pitch*0.7 .. pitch*1.3).
#   4. Measure support length on a long chain -> support_min_length_nm.
#   5. Re-validate the selection thresholds (gcv_ambiguity_rel_threshold) with
#      test/sensitivity_thresholds.jl if the new molecule's GCV curve differs.

[model]
selection_policy = "gcv_with_robust_aicc_guard"
selection_criterion = "gcv"

# ── Lobe width (sigma, derived from measured FWHM via sigma = FWHM / 2.355) ──
# Chitosan: FWHM 0.45–1.20 nm -> sigma_parallel 0.191–0.509 nm.
sigma_parallel_min_nm = 0.191
sigma_parallel_max_nm = 0.509

# ── Repeat spacing (observed monomer pitch, ±~30% band) ──
# Chitosan pitch ≈ 0.52 nm -> spacing 0.35–0.75 nm.
spacing_min_nm = 0.35
spacing_max_nm = 0.75

# ── ROI / support ──
fit_width_nm = 0.16              # half-width of the chain profile strip
support_noise_k = 2.5            # ROI threshold = baseline + k*MAD
support_padding_nm = 0.25        # pad support ends to avoid edge truncation
support_min_length_nm = 1.0      # reject chains shorter than this
max_overlap = 0.60               # max Gaussian pair-overlap (sets spacing floor)

# ── Optimizer ──
global_maxtime = 10.0            # NLopt global budget (s) per N
global_maxiter = 10000
n_max = 14                       # generous cap on lobes per chain

# ── Variants ──
chain_tilted_baseline = true
chain_circular_sigmas = false

[selection]
# Model-selection thresholds (label-free). Re-validate on a new molecule's GCV
# curve with test/sensitivity_thresholds.jl if its lobe statistics differ.
gcv_ambiguity_rel_threshold = 0.05  # GCV gap below which two N are "indistinguishable"
robust_guard_nu = 8.0                # Student-t df for the robust-AICc guard

[preprocessing]
channel = "Z"                   # Nanonis channel name (topography by default)
direction = "fwd"
stride = 1
flatten = "plane+rows"          # "plane", "rows", "plane+rows", or "none"
smooth_radius_px = 1
