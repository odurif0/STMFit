# Chitosan/Cu(100) 240817 benchmark manifest.
#
# This manifest is for evaluation and reporting only. It must not be used by the
# fitting or model-selection code, and it intentionally contains no `expected_n`
# field or selection prior.  The `target_N_for_human_validation` values document
# the independent human/scientific interpretation used to audit calibration.

[benchmark]
name = "chitosan_240817"
system = "chitosan on Cu(100)"
data_dir_env = "STMFIT_DATA_DIR"
default_config = "config/chitosan.toml"
primary_result = "N_eff"
selection_policy = "No expected-N prior; no prefer-N tie-break; report ambiguity explicitly."
notes = "030/031/032 are unreliable and excluded from the primary benchmark."

[quality_classes]
clean = "Primary benchmark files without a known quality exclusion."
clean_target = "Primary benchmark files where current calibration should be improved by generic methods."
poor_quality = "Kept for traceability/stress testing, excluded from primary benchmark metrics."
excluded = "Excluded from batch input or historical non-chain/exclusion list."

