name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'packages/**/src/**'
      - 'src/**'
      - '.github/workflows/Documentation.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'packages/**/src/**'
      - 'src/**'
      - '.github/workflows/Documentation.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'
      - uses: julia-actions/cache@v2
      - name: Install dependencies
        run: |
          # The [sources] section in Project.toml points to local packages;
          # resolve() builds the Manifest from those local paths, then instantiate() precompiles.
          julia --project=. -e 'using Pkg; Pkg.resolve(); Pkg.instantiate(); Pkg.precompile()'
      - name: Build docs
        run: julia --project=. docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
          GKSwstype: "100"  # headless plots (GaussianFit2D loads Plots.jl)
