name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'packages/**/src/**'
      - 'src/**'
      - '.github/workflows/Documentation.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'packages/**/src/**'
      - 'src/**'
      - '.github/workflows/Documentation.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'
      - uses: julia-actions/cache@v2
      - name: Install dependencies
        # Local packages are declared in [sources] (requires Julia ≥ 1.11).
        # develop() registers them explicitly so Pkg doesn't look for them in General.
        run: |
          julia --project=. -e '
            using Pkg
            for pkg in ["STMFitCore","STMSXMIO","GaussianFit1D","GaussianFit2D","STMMolecularFit"]
              Pkg.develop(PackageSpec(path="packages/$pkg.jl"))
            end
            Pkg.instantiate(); Pkg.precompile()
          '
      - name: Build docs
        run: julia --project=. docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
          GKSwstype: "100"  # headless plots (GaussianFit2D loads Plots.jl)
